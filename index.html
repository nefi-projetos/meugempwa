<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Assistente IA</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; background-color: #f0f2f5; display: flex; flex-direction: column; height: 100vh; }
        #chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .message { max-width: 80%; padding: 12px 16px; border-radius: 15px; line-height: 1.4; }
        .user-message { background-color: #0b93f6; color: white; align-self: flex-end; border-bottom-right-radius: 2px; }
        .bot-message { background-color: #e5e5ea; color: black; align-self: flex-start; border-bottom-left-radius: 2px; }
        #input-area { display: flex; padding: 15px; background-color: white; border-top: 1px solid #ccc; }
        #user-input { flex: 1; padding: 12px; border: 1px solid #ccc; border-radius: 25px; outline: none; font-size: 16px; }
        #send-btn { background-color: #0b93f6; color: white; border: none; padding: 0 20px; margin-left: 10px; border-radius: 25px; cursor: pointer; font-size: 16px; font-weight: bold; }
        #send-btn:disabled { background-color: #ccc; }
    </style>
</head>
<body>

    <div id="chat-container">
        <div class="message bot-message">Olá! Eu sou o seu assistente. Como posso ajudar hoje?</div>
    </div>

    <div id="input-area">
        <input type="text" id="user-input" placeholder="Digite sua mensagem..." autocomplete="off">
        <button id="send-btn">Enviar</button>
    </div>

    <script>
        const chatContainer = document.getElementById('chat-container');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            // Adiciona a mensagem do usuário na tela
            addMessage(text, 'user-message');
            userInput.value = '';
            sendBtn.disabled = true;

            // Adiciona um "Digitando..." temporário
            const typingDiv = addMessage('Digitando...', 'bot-message');

            try {
                // Envia para o nosso futuro Backend (Vercel)
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text })
                });

                const data = await response.json();
                
                // Remove o "Digitando..." e coloca a resposta real
                chatContainer.removeChild(typingDiv);
                addMessage(data.reply, 'bot-message');

            } catch (error) {
                chatContainer.removeChild(typingDiv);
                addMessage('Ops! Tive um problema de conexão.', 'bot-message');
            }
            
            sendBtn.disabled = false;
        }

        function addMessage(text, className) {
            const div = document.createElement('div');
            div.className = `message ${className}`;
            div.textContent = text;
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight; // Rola para o fim
            return div;
        }

        sendBtn.addEventListener('click', sendMessage);
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
